<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kèo Nhậu Anh Em</title>
    <style>
        body { font-family: 'Arial', sans-serif; text-align: center; background-color: #f4f4f9; padding-top: 50px; }
        .container { background: white; padding: 30px; border-radius: 15px; display: inline-block; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 85%; max-width: 400px; }
        h1 { color: #2c3e50; font-size: 22px; line-height: 1.4; }
        p { color: #666; }
        button { padding: 12px 25px; margin: 10px; font-size: 18px; cursor: pointer; border: none; border-radius: 8px; transition: 0.3s; width: 120px; font-weight: bold; }
        #btn-yes { background-color: #27ae60; color: white; }
        #btn-no { background-color: #e74c3c; color: white; }
        #message { margin-top: 25px; font-size: 20px; font-weight: bold; line-height: 1.6; }
        .emoji { font-size: 30px; }
    </style>
</head>
<body>

<div class="container">
    <div class="emoji">🍻</div>
    <h1>Chiều nay mấy anh em mình làm vài ly chứ ạ?</h1>
    <p>Mọi người cho em xin ý kiến để em chuẩn bị nhé!</p>
    
    <button id="btn-yes" onclick="showResult('yes')">Đồng ý ✅</button>
    <button id="btn-no" onclick="showResult('no')">Từ chối ❌</button>

    <div id="message"></div>
</div>

<script>
    function showResult(choice) {
        const msg = document.getElementById('message');
        if (choice === 'yes') {
            msg.innerHTML = "Dạ chốt kèo luôn! <br> Em tính hết Xiền... <br> <span style='color:#d32f2f; font-size: 24px;'>CÁC ANH BAO NHÉ!</span> 💸🤣";
            msg.style.color = "#27ae60";
        } else {
            msg.innerHTML = "Dạ đừng từ chối mà... <br> Đi cho vui mấy anh ơi,! 😞🍺";
            msg.style.color = "#c0392b";
        }
    }
</script>

</body>
</html>
